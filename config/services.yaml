# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    gemini_api_key_default: ''
    groq_api_key_default: ''
    hf_token_default: ''
    pexels_api_key_default: ''
    app.rappel_sms_nom_cabinet: 'AutiCare'
    app_mailer_from_default: 'noreply@auticare.fr'
    app_mailer_from_name_default: 'AutiCare'
    # Code pays par défaut pour les numéros sans indicatif (ex: 33 France, 216 Tunisie)
    app.rappel_sms_default_country_code: '216'
    uploads_directory: '%kernel.project_dir%/public/uploads/produits'
    uploads_modules_directory: '%kernel.project_dir%/public/uploads/modules'
    uploads_blogs_directory: '%kernel.project_dir%/public/uploads/blog'
    uploads_ressources_directory: '%kernel.project_dir%/public/uploads/ressources'
    uploads_users_directory: '%kernel.project_dir%/public/uploads/users'
    uploads_commentaires_directory: '%kernel.project_dir%/public/uploads/commentaires'
    uploads_thematiques_directory: '%kernel.project_dir%/public/uploads/thematiques'
    uploads_tsa_generated_directory: '%kernel.project_dir%/public/uploads/tsa_generated'
    rorschach_plates_directory: '%kernel.project_dir%/public/images/rorschach'
    app_url_default: ''
    libretranslate_api_key_default: ''
    ai_recommender_api_key_default: ''
    ai_recommender_model_default: ''
    ai_recommender_base_url_default: ''
    youtube_api_key_default: ''

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Repository Notification : valeur explicite pour $entityClass (évite l'erreur d'autowiring)
    App\Repository\NotificationRepository:
        arguments:
            $entityClass: App\Entity\Notification

    # Force l'URI de redirection OAuth (Google) pour éviter redirect_uri_mismatch si APP_URL est défini
    App\EventSubscriber\OAuthRedirectUriContextSubscriber:
        arguments:
            $appUrl: '%env(APP_URL)%'

    App\Service\ExternalAiRecommendationService:
        arguments:
            $enabled: '%env(default::AI_RECOMMENDER_ENABLED)%'
            $apiKey: '%env(default:ai_recommender_api_key_default:AI_RECOMMENDER_API_KEY)%'
            $model: '%env(default:ai_recommender_model_default:AI_RECOMMENDER_MODEL)%'
            $baseUrl: '%env(default:ai_recommender_base_url_default:AI_RECOMMENDER_BASE_URL)%'

    App\Service\LibreTranslateService:
        arguments:
            $cache: '@cache.app'
            $apiUrl: '%env(LIBRETRANSLATE_URL)%'
            $cacheTtl: '%env(int:LIBRETRANSLATE_CACHE_TTL)%'
            $apiKey: '%env(default:libretranslate_api_key_default:LIBRETRANSLATE_API_KEY)%'

    App\Service\PexelsService:
        arguments:
            $pexelsApiKey: '%env(PEXELS_API_KEY)%'

    App\Service\GroqSummaryService:
        arguments:
            $apiKey: '%env(default:groq_api_key_default:GROQ_API_KEY)%'

    App\Service\GroqModuleGeneratorService:
        arguments:
            $apiKey: '%env(default:groq_api_key_default:GROQ_API_KEY)%'

    App\Service\GroqBlogGeneratorService:
        arguments:
            $apiKey: '%env(default:groq_api_key_default:GROQ_API_KEY)%'

    App\Service\GroqSpellCheckService:
        arguments:
            $apiKey: '%env(default:groq_api_key_default:GROQ_API_KEY)%'

    App\Service\GroqHashtagGeneratorService:
        arguments:
            $apiKey: '%env(default:groq_api_key_default:GROQ_API_KEY)%'

    App\Service\GroqQuizGeneratorService:
        arguments:
            $apiKey: '%env(default:groq_api_key_default:GROQ_API_KEY)%'

    App\Service\ProfanityFilterService:
        arguments:
            $badWordsFile: '%kernel.project_dir%/config/bad_words.txt'

    App\Service\ZoomApiService:
        arguments:
            $accountId: '%env(default::ZOOM_ACCOUNT_ID)%'
            $clientId: '%env(default::ZOOM_CLIENT_ID)%'
            $clientSecret: '%env(default::ZOOM_CLIENT_SECRET)%'

    App\Service\RendezVousConfirmationMailer:
        arguments:
            $fromEmail: '%env(default:app_mailer_from_default:MAILER_FROM)%'
            $fromName: '%env(default:app_mailer_from_name_default:MAILER_FROM_NAME)%'

    App\Command\TestMailCommand:
        arguments:
            $fromEmail: '%env(default:app_mailer_from_default:MAILER_FROM)%'
            $fromName: '%env(default:app_mailer_from_name_default:MAILER_FROM_NAME)%'

    App\Service\RappelSmsService:
        arguments:
            $nomCabinet: '%app.rappel_sms_nom_cabinet%'
            $defaultCountryCode: '%app.rappel_sms_default_country_code%'

    App\Command\SmsTestRappelCommand:
        arguments:
            $nomCabinet: '%app.rappel_sms_nom_cabinet%'

    App\Service\GoogleCalendarService:
        arguments:
            $credentialsPath: '%env(default::GOOGLE_CALENDAR_CREDENTIALS)%'
            $calendarId: '%env(default::GOOGLE_CALENDAR_ID)%'

    App\Service\GeminiChatService:
        arguments:
            $apiKey: '%env(default:gemini_api_key_default:GEMINI_API_KEY)%'

    App\Service\GroqChatService:
        arguments:
            $apiKey: '%env(default:groq_api_key_default:GROQ_API_KEY)%'

    App\Service\HuggingFaceImageService:
        arguments:
            $apiToken: '%env(default:hf_token_default:HF_TOKEN)%'
            $uploadDir: '%uploads_tsa_generated_directory%'

    App\Service\PexelsImageService:
        arguments:
            $apiKey: '%env(default:pexels_api_key_default:PEXELS_API_KEY)%'

    App\Service\RorschachSvgService:
        arguments:
            $uploadDir: '%uploads_tsa_generated_directory%'
            $platesDir: '%rorschach_plates_directory%'

    App\Service\YoutubeVideoService:
        arguments:
            $apiKey: '%env(default:youtube_api_key_default:YOUTUBE_API_KEY)%'

    App\Service\GoogleBooksService:
        arguments:
            $apiKey: '%env(default::GOOGLE_BOOKS_API_KEY)%'

    # Injection explicite des repositories pour FavorisController (évite confusion autowiring)
    App\Controller\FavorisController:
        arguments:
            $moduleBookmarkRepository: '@App\Repository\ModuleBookmarkRepository'
            $moduleRepository: '@App\Repository\ModuleRepository'
            $googleBooksService: '@App\Service\GoogleBooksService'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

