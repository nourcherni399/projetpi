# config/services.yaml
# This file configures services and parameters for the entire application

parameters:
    # Secret pour l'API de rappels d'événements (cron)
    reminder_secret: '%env(default:kernel.secret:REMINDER_SECRET)%'
    # Gateways Email-to-SMS par code pays (JSON)
    reminder_sms_gateways: '%env(default::REMINDER_SMS_GATEWAYS)%'
    reminder_from_email: 'amarahedil8@gmail.com'
    reminder_from_name: 'AutiCare'
    
    # Paramètres par défaut
    mailer_from_email_default: 'noreply@auticare.fr'
    openai_chat_model_default: 'gpt-4o'
    chat_model_default: 'gpt-4o'
    chat_api_url_default: ''
    chat_api_base_url_default: ~
    app_url_default: ''
    brevo_from_name_default: 'AutiCare'
    stripe_secret_key_default: ''
    libretranslate_api_key_default: ''
    groq_api_key_default: ''
    app.rappel_sms_nom_cabinet: 'AutiCare'
    app.rappel_sms_default_country_code: '216'

    # Répertoires d'uploads
    uploads_directory: '%kernel.project_dir%/public/uploads/produits'
    uploads_produits_directory: '%kernel.project_dir%/public/uploads/produits'
    uploads_modules_directory: '%kernel.project_dir%/public/uploads/modules'
    uploads_blogs_directory: '%kernel.project_dir%/public/uploads/blog'
    uploads_ressources_directory: '%kernel.project_dir%/public/uploads/ressources'
    uploads_users_directory: '%kernel.project_dir%/public/uploads/users'
    uploads_commentaires_directory: '%kernel.project_dir%/public/uploads/commentaires'
    uploads_thematiques_directory: '%kernel.project_dir%/public/uploads/thematiques'
    uploads_evenements_directory: '%kernel.project_dir%/public/uploads/evenements'
    uploads_tsa_generated_directory: '%kernel.project_dir%/public/uploads/tsa_generated'
    rorschach_plates_directory: '%kernel.project_dir%/public/images/rorschach'

services:
    # Configuration par défaut pour tous les services
    _defaults:
        autowire: true      # injection automatique des dépendances
        autoconfigure: true # enregistrement automatique comme commande, subscriber, etc.

    # Makes classes in src/ available as services
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Subscriber OAuth
    App\EventSubscriber\OAuthRedirectUriContextSubscriber:
        arguments:
            $appUrl: '%env(default:app_url_default:APP_URL)%'

    # Services externes et API
    App\Service\ZoomApiService:
        arguments:
            $accountId: '%env(default::ZOOM_ACCOUNT_ID)%'
            $clientId: '%env(default::ZOOM_CLIENT_ID)%'
            $clientSecret: '%env(default::ZOOM_CLIENT_SECRET)%'

    App\Service\EmailApiService:
        arguments:
            $apiKey: '%env(default::BREVO_API_KEY)%'
            $fromEmail: '%env(default::BREVO_FROM_EMAIL)%'
            $fromName: '%env(default:brevo_from_name_default:BREVO_FROM_NAME)%'

    App\Service\StripeService:
        arguments:
            $secretKey: '%env(default:stripe_secret_key_default:STRIPE_SECRET_KEY)%'

    App\Service\DemandeProduitEnrichmentService:
        arguments:
            $openaiApiKey: '%env(default::OPENAI_API_KEY)%'

    App\Service\ProductExternalApiService:
        arguments:
            $rapidApiKey: '%env(default::RAPIDAPI_KEY)%'
            $pexelsApiKey: '%env(default::PEXELS_API_KEY)%'
            $uploadsDirectory: '%uploads_directory%'

    App\Service\ProductAutoCreateService:
        arguments:
            $uploadsDirectory: '%uploads_directory%'

    App\Service\ProductConversationService:
        arguments:
            $apiKey: '%env(default::OPENAI_API_KEY)%'
            $model: 'gpt-4o-mini'
            $apiBaseUrl: '%env(default:chat_api_base_url_default:CHAT_API_BASE_URL)%'

    App\Service\ChatApiService:
        arguments:
            $groqApiKey: '%env(default::CHAT_API_KEY)%'

    App\Service\GeminiChatService:
        arguments:
            $apiKey: '%env(default::GEMINI_API_KEY)%'

    App\Service\GroqChatService:
        arguments:
            $apiKey: '%env(default:groq_api_key_default:CHAT_API_KEY)%'

    App\Service\ProductPriceSearchService:
        arguments:
            $serpApiKey: '%env(default::SERP_API_KEY)%'
            $rapidApiKey: '%env(default::RAPIDAPI_KEY)%'
            $pexelsApiKey: '%env(default::PEXELS_API_KEY)%'
            $groqApiKey: '%env(default::CHAT_API_KEY)%'
            $uploadsDirectory: '%uploads_directory%'

    App\Service\ImageAnalysisService:
        arguments:
            $groqApiKey: '%env(CHAT_API_KEY)%'
            $openaiApiKey: '%env(default::OPENAI_API_KEY)%'
            $geminiApiKey: '%env(default::GEMINI_API_KEY)%'

    App\Service\ProductDescriptionSuggestionService:
        arguments:
            $groqApiKey: '%env(CHAT_API_KEY)%'

    App\Service\AIPredictionService:
        arguments:
            $groqApiKey: '%env(CHAT_API_KEY)%'

    App\Service\ReminderSmsSender:
        arguments:
            $gatewaysJson: '%reminder_sms_gateways%'
            $fromEmail: '%reminder_from_email%'
            $fromName: '%reminder_from_name%'

    App\Service\RendezVousConfirmationMailer:
        arguments:
            $fromEmail: '%env(default:mailer_from_email_default:MAILER_FROM)%'
            $fromName: '%env(default:brevo_from_name_default:MAILER_FROM_NAME)%'

    App\Service\RappelSmsService:
        arguments:
            $nomCabinet: '%app.rappel_sms_nom_cabinet%'
            $defaultCountryCode: '%app.rappel_sms_default_country_code%'

    App\Service\GoogleCalendarService:
        arguments:
            $credentialsPath: '%env(default::GOOGLE_CALENDAR_CREDENTIALS)%'
            $calendarId: '%env(default::GOOGLE_CALENDAR_ID)%'

    App\Service\HuggingFaceService:
        arguments:
            $apiKey: '%env(default::HUGGINGFACE_API_KEY)%'
            $projectDir: '%kernel.project_dir%'

    App\Service\HuggingFaceImageService:
        arguments:
            $apiToken: '%env(default::HUGGINGFACE_API_KEY)%'
            $uploadDir: '%uploads_produits_directory%'

    App\Service\GoogleCustomSearchService:
        arguments:
            $apiKey: '%env(default::GOOGLE_CSE_API_KEY)%'
            $searchEngineId: '%env(default::GOOGLE_CSE_CX)%'

    App\Service\LibreTranslateService:
        arguments:
            $cache: '@cache.app'
            $apiUrl: '%env(LIBRETRANSLATE_URL)%'
            $cacheTtl: '%env(int:LIBRETRANSLATE_CACHE_TTL)%'
            $apiKey: '%env(default:libretranslate_api_key_default:LIBRETRANSLATE_API_KEY)%'

    App\Service\PexelsService:
        arguments:
            $pexelsApiKey: '%env(PEXELS_API_KEY)%'

    App\Service\PexelsImageService:
        arguments:
            $apiKey: '%env(default::PEXELS_API_KEY)%'

    App\Service\RorschachSvgService:
        arguments:
            $uploadDir: '%uploads_tsa_generated_directory%'
            $platesDir: '%rorschach_plates_directory%'

    App\Service\GroqSummaryService:
        arguments:
            $apiKey: '%env(default:groq_api_key_default:CHAT_API_KEY)%'

    App\Service\GroqModuleGeneratorService:
        arguments:
            $apiKey: '%env(default:groq_api_key_default:CHAT_API_KEY)%'

    App\Service\GroqBlogGeneratorService:
        arguments:
            $apiKey: '%env(default:groq_api_key_default:CHAT_API_KEY)%'

    App\Service\GroqSpellCheckService:
        arguments:
            $apiKey: '%env(default:groq_api_key_default:CHAT_API_KEY)%'

    App\Service\GroqHashtagGeneratorService:
        arguments:
            $apiKey: '%env(default:groq_api_key_default:CHAT_API_KEY)%'

    App\Service\ExternalAiRecommendationService:
        arguments:
            $enabled: '%env(default::AI_RECOMMENDER_ENABLED)%'
            $apiKey: '%env(default::AI_RECOMMENDER_API_KEY)%'
            $model: '%env(default::AI_RECOMMENDER_MODEL)%'
            $baseUrl: '%env(default::AI_RECOMMENDER_BASE_URL)%'

    App\Service\ProfanityFilterService:
        arguments:
            $badWordsFile: '%kernel.project_dir%/config/bad_words.txt'

    # Controllers avec arguments spécifiques
    App\Controller\OrderController:
        arguments:
            $mailerFromEmail: '%env(default:mailer_from_email_default:MAILER_FROM_EMAIL)%'

    App\Controller\Admin\DemandeProduitController:
        arguments:
            $uploadsDirectory: '%uploads_directory%'

    App\Controller\Admin\IdeesEvenementController:
        arguments:
            $cache: '@cache.app'

    App\Controller\ProductController:
        arguments:
            $uploadsDirectory: '%kernel.project_dir%/public/uploads'