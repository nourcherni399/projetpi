# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    uploads_directory: '%kernel.project_dir%/public/uploads/produits'
    uploads_modules_directory: '%kernel.project_dir%/public/uploads/modules'
    uploads_blogs_directory: '%kernel.project_dir%/public/uploads/blog'
    uploads_ressources_directory: '%kernel.project_dir%/public/uploads/ressources'
    uploads_users_directory: '%kernel.project_dir%/public/uploads/users'
    uploads_commentaires_directory: '%kernel.project_dir%/public/uploads/commentaires'
    app_url_default: ''
    libretranslate_api_key_default: ''
    groq_api_key_default: ''

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Repository Notification : valeur explicite pour $entityClass (évite l'erreur d'autowiring)
    App\Repository\NotificationRepository:
        arguments:
            $entityClass: App\Entity\Notification

    # Force l'URI de redirection OAuth (Google) pour éviter redirect_uri_mismatch si APP_URL est défini
    App\EventSubscriber\OAuthRedirectUriContextSubscriber:
        arguments:
            $appUrl: '%env(default:app_url_default:APP_URL)%'

